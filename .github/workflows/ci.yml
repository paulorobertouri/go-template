name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=mod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: |
          go mod download
          go mod download github.com/labstack/echo/v4 github.com/swaggo/echo-swagger github.com/swaggo/swag github.com/joho/godotenv github.com/golang-jwt/jwt/v5 github.com/stretchr/testify

      - name: Vet
        run: go vet . ./internal/api ./internal/di ./internal/domain ./internal/middleware ./internal/repositories ./internal/services ./tests/e2e ./tests/unit

      - name: Test
        run: go test -count=1 -v ./internal/api ./internal/di ./internal/domain ./internal/middleware ./internal/repositories ./internal/services ./tests/e2e ./tests/unit

      - name: Build
        run: go build .
